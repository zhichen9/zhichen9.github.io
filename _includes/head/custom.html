<!-- Minimal academic layout used by the master branch. -->
<style>
:root {
  --site-bg: #ffffff;
  --site-text: #222222;
  --site-muted: #666666;
  --site-border: #e6e6e6;
  --site-link: #0645ad;
  --site-link-hover: #000000;
  --site-nav-bg: #ffffff;
  --site-button-bg: #f7f7f7;
  --site-button-text: #333333;
  --site-button-border: #d8d8d8;
}

@media (prefers-color-scheme: dark) {
  :root[data-theme="auto"] {
    --site-bg: #161719;
    --site-text: #eeeeee;
    --site-muted: #b8b8b8;
    --site-border: #33363a;
    --site-link: #8ab4f8;
    --site-link-hover: #d2e3fc;
    --site-nav-bg: #161719;
    --site-button-bg: #202124;
    --site-button-text: #eeeeee;
    --site-button-border: #44474d;
  }
}

:root[data-theme="dark"] {
  --site-bg: #161719;
  --site-text: #eeeeee;
  --site-muted: #b8b8b8;
  --site-border: #33363a;
  --site-link: #8ab4f8;
  --site-link-hover: #d2e3fc;
  --site-nav-bg: #161719;
  --site-button-bg: #202124;
  --site-button-text: #eeeeee;
  --site-button-border: #44474d;
}

body {
  padding-top: 0;
  color: var(--site-text);
  background: var(--site-bg);
  font-family: Arial, Helvetica, sans-serif;
  font-size: 16px;
  line-height: 1.55;
}

.masthead {
  position: static;
  height: auto;
  background: var(--site-nav-bg);
  border-bottom: 1px solid var(--site-border);
  box-shadow: none;
}

.masthead__inner-wrap {
  max-width: 820px;
  padding: 18px 16px 12px;
}

.masthead__menu-item--lg {
  padding-right: 28px;
  font-weight: 700;
}

.masthead__menu-item a {
  color: var(--site-text);
}

.masthead__menu-item a:hover {
  color: var(--site-link-hover);
  text-decoration: underline;
}

.masthead__menu-item--theme {
  float: right;
}

.theme-toggle {
  border: 1px solid var(--site-button-border);
  border-radius: 999px;
  background: var(--site-button-bg);
  color: var(--site-button-text);
  cursor: pointer;
  font: inherit;
  font-size: 0.9em;
  line-height: 1;
  padding: 6px 10px;
}

.theme-toggle:hover,
.theme-toggle:focus {
  border-color: var(--site-muted);
  outline: none;
}

.theme-toggle__icon {
  display: inline-block;
  min-width: 1.1em;
  text-align: center;
}

.theme-toggle__label {
  margin-left: 4px;
}

#main {
  max-width: 820px;
  margin: 28px auto 0;
  padding: 0 16px;
}

.page {
  float: none;
  width: 100%;
  padding: 0;
}

.page .page__inner-wrap {
  float: none;
  width: 100%;
}

.page__title {
  margin: 0 0 22px;
  font-size: 2.1em;
  line-height: 1.15;
  font-weight: 700;
}

.page__content h2 {
  margin-top: 1.45em;
  margin-bottom: 0.55em;
  padding-bottom: 0;
  border-bottom: 0;
  font-size: 1.45em;
  font-weight: 700;
}

.page__content p,
.page__content li {
  font-size: 1em;
}

.page__content a {
  color: var(--site-link);
  text-decoration: underline;
}

.page__footer {
  max-width: 820px;
  margin: 36px auto 0;
  padding: 0 16px 24px;
  border-top: 1px solid var(--site-border);
  color: var(--site-muted);
}

.page__footer-follow {
  display: none;
}

.academic-profile {
  margin-bottom: 1.2em;
}

.academic-profile strong {
  font-size: 1.08em;
}

.misc-gallery-page #main {
  max-width: 1120px;
}

.misc-gallery-page .page__title {
  text-align: center;
}

@media (max-width: 720px) {
  .masthead__menu-item--theme {
    float: none;
  }

  .masthead__menu-item--lg {
    display: block;
    padding-right: 0;
    margin-bottom: 8px;
  }

  .masthead__menu-item {
    margin-right: 14px;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var modes = [
    { value: 'light', label: 'Light', icon: '☀' },
    { value: 'auto', label: 'Auto', icon: '◐' },
    { value: 'dark', label: 'Dark', icon: '☾' }
  ];
  var button = document.getElementById('theme-toggle');
  var icon = button && button.querySelector('.theme-toggle__icon');
  var label = button && button.querySelector('.theme-toggle__label');

  function currentMode() {
    return localStorage.getItem('site-theme') || 'auto';
  }

  function applyTheme(mode) {
    var selected = modes.find(function(item) { return item.value === mode; }) || modes[1];
    document.documentElement.setAttribute('data-theme', selected.value);
    localStorage.setItem('site-theme', selected.value);

    if (button) {
      button.setAttribute('title', 'Theme: ' + selected.label);
      button.setAttribute('aria-label', 'Theme: ' + selected.label + '. Click to switch.');
    }

    if (icon) icon.textContent = selected.icon;
    if (label) label.textContent = selected.label;
  }

  if (!button) return;

  applyTheme(currentMode());

  button.addEventListener('click', function() {
    var mode = currentMode();
    var index = modes.findIndex(function(item) { return item.value === mode; });
    var next = modes[(index + 1) % modes.length].value;
    applyTheme(next);
  });
});
</script>
