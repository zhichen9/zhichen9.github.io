<!-- Minimal academic layout used by the master branch. -->
<style>
:root {
  --site-bg: #ffffff;
  --site-text: #222222;
  --site-muted: #666666;
  --site-border: #e6e6e6;
  --site-link: #0645ad;
  --site-link-hover: #000000;
  --site-nav-bg: #f3f3f3;
  --site-button-bg: #f7f7f7;
  --site-button-text: #333333;
  --site-button-border: #d8d8d8;
}

@media (prefers-color-scheme: dark) {
  :root[data-theme="auto"] {
    --site-bg: #161719;
    --site-text: #eeeeee;
    --site-muted: #b8b8b8;
    --site-border: #33363a;
    --site-link: #8ab4f8;
    --site-link-hover: #d2e3fc;
    --site-nav-bg: #1f2023;
    --site-button-bg: #202124;
    --site-button-text: #eeeeee;
    --site-button-border: #44474d;
  }
}

:root[data-theme="dark"] {
  --site-bg: #161719;
  --site-text: #eeeeee;
  --site-muted: #b8b8b8;
  --site-border: #33363a;
  --site-link: #8ab4f8;
  --site-link-hover: #d2e3fc;
  --site-nav-bg: #1f2023;
  --site-button-bg: #202124;
  --site-button-text: #eeeeee;
  --site-button-border: #44474d;
}

body {
  padding-top: 0;
  color: var(--site-text);
  background: var(--site-bg);
  font-family: "Times New Roman", Times, serif;
  font-size: 16px;
  line-height: 1.45;
}

.masthead {
  position: static;
  height: auto;
  background: var(--site-nav-bg);
  border-bottom: 1px solid var(--site-border);
  box-shadow: none;
  box-sizing: border-box;
}

.masthead__inner-wrap {
  padding: 10px 8px;
}

.masthead__menu,
.academic-nav {
  margin: 0;
  padding: 0;
}

.academic-nav__title {
  display: block;
  margin: 0 0 7px;
  padding-bottom: 3px;
  border-bottom: 1px solid #999;
  color: #000;
  font-weight: 700;
  text-decoration: underline;
}

.academic-nav__link {
  display: block;
  margin: 0 0 4px;
  color: var(--site-link);
  text-decoration: none;
}

.academic-nav__link:hover,
.academic-nav__title:hover {
  color: var(--site-link-hover);
  text-decoration: underline;
}

.theme-toggle {
  border: 0;
  background: transparent;
  color: var(--site-link);
  cursor: pointer;
  font: inherit;
  font-size: 1em;
  line-height: inherit;
  padding: 0;
  text-align: left;
}

.theme-toggle:hover,
.theme-toggle:focus {
  outline: none;
  text-decoration: underline;
}

.theme-toggle__label {
  margin-left: 4px;
}

#main {
  max-width: 860px;
  margin: 18px auto 0;
  padding: 0 12px;
}

.page {
  float: none;
  width: 100%;
  padding: 0;
}

.page .page__inner-wrap {
  float: none;
  width: 100%;
}

.page__title {
  margin: 0 0 18px;
  padding-bottom: 0.2em;
  border-bottom: 1px solid var(--site-border);
  font-size: 1.55em;
  line-height: 1.15;
  font-weight: 700;
}

.page__content h2 {
  margin-top: 1.25em;
  margin-bottom: 0.45em;
  padding-bottom: 0.1em;
  border-bottom: 1px solid var(--site-border);
  font-size: 1.15em;
  font-weight: 700;
}

.page__content p,
.page__content li {
  font-size: 1em;
}

.page__content a {
  color: var(--site-link);
  text-decoration: underline;
}

.page__footer {
  max-width: 860px;
  margin: 32px auto 0;
  padding: 0 12px 24px;
  background: var(--site-bg);
  border-top: 1px solid var(--site-border);
  color: var(--site-muted);
}

.page__footer footer {
  max-width: 100%;
  margin: 0;
  padding: 14px 0 0;
}

.page__footer-follow {
  display: none;
}

.academic-profile {
  margin: 0;
}

.academic-profile strong {
  font-size: 1.08em;
}

.profile-header {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  margin: 0 0 1.1em;
}

.profile-photo {
  width: 182px;
  height: auto;
  max-height: 210px;
  object-fit: contain;
  border: 1px solid var(--site-border);
}

.misc-gallery-page #main {
  max-width: 1120px;
}

.research-page #main {
  max-width: 820px;
}

.research-page .page__title {
  margin-bottom: 1.2em;
}

.visitor-map {
  max-width: 420px;
  min-height: 180px;
  margin-top: 10px;
}

.misc-gallery-page .page__title {
  text-align: center;
}

@media (max-width: 720px) {
  .academic-nav__title,
  .academic-nav__link,
  .theme-toggle {
    display: inline-block;
    margin-right: 14px;
  }

  .profile-header {
    display: block;
  }

  .profile-photo {
    width: 132px;
    height: 132px;
    margin: 0 0 14px;
  }
}

@media (min-width: 980px) {
  .masthead {
    position: fixed;
    top: 0;
    left: 0;
    width: 86px;
    min-height: 100vh;
    background: #eeeeee;
    border-right: 1px solid #cfcfcf;
    border-bottom: 0;
    z-index: 10;
  }

  .masthead__inner-wrap {
    width: auto;
    padding: 10px 6px;
  }

  .academic-nav__title,
  .academic-nav__link,
  .theme-toggle {
    font-size: 13px;
    line-height: 1.25;
  }

  .academic-nav__title {
    margin-bottom: 6px;
    padding-bottom: 2px;
    border-bottom: 1px solid #888;
    color: #000;
    text-decoration: underline;
  }

  .academic-nav__link {
    margin-bottom: 3px;
    color: #0645ad;
    text-decoration: underline;
  }

  .theme-toggle {
    position: fixed;
    left: 6px;
    bottom: 10px;
    width: 72px;
    color: #0645ad;
    font-size: 12px;
  }

  #main,
  .page__footer {
    margin-left: 104px;
    margin-right: auto;
  }

  #main {
    margin-top: 8px;
  }

  .research-page #main {
    max-width: 820px;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var modes = [
    { value: 'light', label: 'Light' },
    { value: 'auto', label: 'Auto' },
    { value: 'dark', label: 'Dark' }
  ];
  var button = document.getElementById('theme-toggle');
  var label = button && button.querySelector('.theme-toggle__label');

  function currentMode() {
    return localStorage.getItem('academic-site-theme') || 'light';
  }

  function applyTheme(mode) {
    var selected = modes.find(function(item) { return item.value === mode; }) || modes[1];
    document.documentElement.setAttribute('data-theme', selected.value);
    localStorage.setItem('academic-site-theme', selected.value);

    if (button) {
      button.setAttribute('title', 'Theme: ' + selected.label);
      button.setAttribute('aria-label', 'Theme: ' + selected.label + '. Click to switch.');
    }

    if (label) label.textContent = 'Theme: ' + selected.label;
  }

  if (!button) return;

  applyTheme(currentMode());

  button.addEventListener('click', function() {
    var mode = currentMode();
    var index = modes.findIndex(function(item) { return item.value === mode; });
    var next = modes[(index + 1) % modes.length].value;
    applyTheme(next);
  });
});
</script>
