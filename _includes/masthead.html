{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="academic-nav" aria-label="Primary navigation">
        <a class="academic-nav__title" href="{{ base_path }}/">{{ site.title }}</a>
        {% for link in site.data.navigation.main %}
          {% if link.url contains 'http' %}
            {% assign domain = '' %}
          {% else %}
            {% assign domain = base_path %}
          {% endif %}
          <a class="academic-nav__link" href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
        {% endfor %}
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Theme: Light. Click to switch." title="Theme: Light">
          <span class="theme-toggle__label">Theme: Light</span>
        </button>
      </nav>
    </div>
  </div>
</div>
