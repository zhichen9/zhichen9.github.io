    description_zh: "投影屏上克罗地亚球员正在庆祝2比1领先，观众坐在长凳上专注观赛，暖色灯光与旗饰让房间充满大赛氛围。"
  - id: 10
    title_en: "Friends' Dinner Gathering"
    title_zh: "朋友聚餐合影"
    date: "Dec 2022"
    location_en: "Northern Europe"
    location_zh: "北欧"
    weather_en: "Indoor night"
    weather_zh: "室内，夜间"
    landmark_en: "Shared apartment kitchen"
    landmark_zh: "合租公寓厨房"
    description_en: "Five friends pose around a cluttered dinner table with bowls, chopsticks, and wine glasses after a home-cooked meal. Yellow curtains and a dark window suggest a cozy winter evening indoors."
    description_zh: "五位朋友在家常便饭后围桌合影，碗碟、筷子与酒杯摆满桌面，黄色窗帘和窗外夜色透出家宴的温馨。"
  - id: 11
    title_en: "Statue of Henri IV, Paris"
    title_zh: "法国 巴黎 亨利四世雕像"
    date: "Dec 2022"
    location_en: "Paris, France"
    location_zh: "法国 巴黎"
    weather_en: "Overcast, late autumn or winter"
    weather_zh: "阴天，深秋或初冬"
    landmark_en: "Henri IV statue"
    landmark_zh: "亨利四世雕像"
    description_en: "A bronze equestrian statue of Henri IV stands before a white-and-red brick Haussmann building. Bare branches and a grey sky give the square a calm, historical atmosphere."
    description_zh: "亨利四世青铜骑马雕像矗立在红白砖立面建筑前，光秃枝丫与灰蒙天空让广场显得沉静而庄重。"

