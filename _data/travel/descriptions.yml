### 🇫🇮 Finland (Dec 2022)
dec_finland:
  - id: 1
    title_en: "Swedish Parliament House at Night, Stockholm"
    title_zh: "瑞典 斯德哥尔摩 议会大厦夜景"
    date: "Dec 2022"
    location_en: "Stockholm, Sweden"
    location_zh: "瑞典 斯德哥尔摩"
    weather_en: "Cold winter night, clear"
    weather_zh: "寒冷冬夜，晴朗"
    landmark_en: "Riksdag (Parliament House)"
    landmark_zh: "瑞典议会大厦"
    description_en: "The Riksdag building glows under warm floodlights on a dark winter night. Bare trees and a lit Christmas tree frame the neoclassical facade along the waterfront."
    description_zh: "冬夜里的瑞典议会大厦在暖色灯光下格外庄严，光秃的树木与点亮的圣诞树映衬着这座临水的古典建筑。"
  - id: 2
    title_en: "Postcard and Stortorget, Stockholm"
    title_zh: "瑞典 斯德哥尔摩 老城广场与明信片"
    date: "Dec 2022"
    location_en: "Stockholm, Sweden"
    location_zh: "瑞典 斯德哥尔摩"
    weather_en: "Overcast, cold"
    weather_zh: "阴天，寒冷"
    landmark_en: "Stortorget, Gamla Stan"
    landmark_zh: "老城广场"
    description_en: "A summer postcard of Stockholm's colorful old-town square is held up against the same facades on a grey December day, with a Christmas tree and market stalls below."
    description_zh: "一张夏日明信片被举在灰蒙蒙的十二月天空下，与斯德哥尔摩老城彩色建筑同框，下方可见圣诞树与集市摊位。"
  - id: 3
    title_en: "Northern Lights over a Fjord"
    title_zh: "北极光下的峡湾夜景"
    date: "Dec 2022"
    location_en: "Northern Europe (Arctic region)"
    location_zh: "北欧 北极圈附近"
    weather_en: "Cold, partly cloudy night"
    weather_zh: "寒冷，夜间多云"
    landmark_en: "Aurora borealis over mountains and water"
    landmark_zh: "山峦与水面上的北极光"
    description_en: "A vivid green aurora rises vertically above snow-dusted mountains while stars peek through broken clouds. Warm lights from a distant shoreline reflect on the calm fjord."
    description_zh: "一道绿色极光垂直升起，掠过覆雪山峦与碎云之间的星空，远处岸边的暖色灯光在峡湾水面轻轻荡漾。"
  - id: 4
    title_en: "Painted Bollards on a Parisian Lane"
    title_zh: "法国 巴黎 彩色路桩小巷"
    date: "Dec 2022"
    location_en: "Paris, France"
    location_zh: "法国 巴黎"
    weather_en: "Overcast, cool"
    weather_zh: "阴天，微凉"
    landmark_en: "Rue Crémieux area"
    landmark_zh: "克里穆克斯路一带"
    description_en: "A narrow cobblestone lane is lined with brightly painted bollards in floral patterns. Haussmann-style buildings, café signs, and a lone pedestrian give the street a quiet Parisian mood."
    description_zh: "狭窄的鹅卵石小巷两侧排列着绘有花卉图案的彩色路桩，奥斯曼风格立面与咖啡馆招牌之间，行人稀少，气氛安静。"
  - id: 5
    title_en: "Holiday Snow Globe Display"
    title_zh: "冬日节日透明球装置"
    date: "Dec 2022"
    location_en: "Northern Europe"
    location_zh: "北欧"
    weather_en: "Overcast daytime, cold"
    weather_zh: "阴天，白天，寒冷"
    landmark_en: "Outdoor winter holiday installation"
    landmark_zh: "户外冬季节日装置"
    description_en: "A child stops before a large transparent dome where a walrus in a tuxedo plays a brass horn beside penguin figures and miniature evergreens. Garland-fenced paving and bare trees mark a festive winter outing."
    description_zh: "一名孩童停在一个大型透明节日球前，球内穿着礼服的海象正吹奏铜管，旁边是企鹅与迷你圣诞树，围栏与光秃树木勾勒出冬日节庆氛围。"
  - id: 6
    title_en: "Brick Church with Copper Clock Tower"
    title_zh: "红砖教堂与绿色铜顶钟塔"
    date: "Dec 2022"
    location_en: "Copenhagen, Denmark"
    location_zh: "丹麦 哥本哈根"
    weather_en: "Cold, bright morning"
    weather_zh: "寒冷，晴朗上午"
    landmark_en: "Historic church tower"
    landmark_zh: "历史教堂钟塔"
    description_en: "Frost dusts the dark roof tiles as a green-patina clock tower rises above red-brick arches. The clock reads late morning under a pale winter sky."
    description_zh: "深色屋瓦上覆着薄薄霜气，绿色铜顶钟塔从红砖拱窗之上拔地而起，钟面指向清冷的冬日上午。"
  - id: 7
    title_en: "Red Brick Turret, Copenhagen"
    title_zh: "丹麦 哥本哈根 红砖角塔"
    date: "Dec 2022"
    location_en: "Copenhagen, Denmark"
    location_zh: "丹麦 哥本哈根"
    weather_en: "Overcast, grey sky"
    weather_zh: "阴天"
    landmark_en: "Historic brick building with copper spire"
    landmark_zh: "带铜顶的历史红砖建筑"
    description_en: "A corner turret capped with weathered green copper rises above ornate brick gables. Heavy cloud cover and a bird crossing the frame add to the still, Nordic city mood."
    description_zh: "一座覆着绿色铜顶的角塔从装饰性红砖山墙后探出，厚重云层下，一只飞鸟掠过，城市显得格外安静。"
  - id: 8
    title_en: "World Cup Match Screening"
    title_zh: "世界杯比赛公共观赛"
    date: "Dec 17, 2022"
    location_en: "Northern Europe"
    location_zh: "北欧"
    weather_en: "Indoor evening"
    weather_zh: "室内，晚间"
    landmark_en: "Sports bar / fan zone"
    landmark_zh: "球迷观赛空间"
