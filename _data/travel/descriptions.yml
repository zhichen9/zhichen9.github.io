    description_zh: "朋友们坐在工业风大厅的长木桌旁，通过大屏幕观看克罗地亚对阵摩洛哥的比赛，天花板上悬挂着各国小旗。"
  - id: 9
    title_en: "Celebrating a World Cup Goal"
    title_zh: "世界杯进球时刻"
    date: "Dec 17, 2022"
    location_en: "Northern Europe"
    location_zh: "北欧"
    weather_en: "Indoor evening"
    weather_zh: "室内，晚间"
    landmark_en: "Public match viewing"
