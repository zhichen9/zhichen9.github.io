dec_finland:
  summary_en: "Where winter becomes spacious and light — Helsinki’s quiet shoreline, soft skies, and calm northern rhythm."
  summary_zh: "冬天在这里变得开阔而明亮——赫尔辛基的安静岸线、柔和天光与北方城市的平静节奏。"
  subtitle_en: "Snow paths, harbor horizons, and still evenings shaped by the northern light."
  subtitle_zh: "覆雪小径、海港天际与被北方光线轻轻塑造的安静黄昏。"

nov_denmark:
  summary_en: "Where warmth meets simplicity — Copenhagen’s colors resting gently in the northern light."
  summary_zh: "温暖与简洁在这里相遇——哥本哈根的色彩安静地停在北方天光里。"
  subtitle_en: "Nyhavn reflections, winter walks, and Danish hygge at dusk."
  subtitle_zh: "新港的倒影、冬日散步，以及黄昏里的丹麦式温暖。"

oct_italy:
  summary_en: "Where water, stone, and history move together — Venice glows through canals, bridges, and late-autumn light."
  summary_zh: "水、石与历史在这里一同流动——威尼斯在运河、桥梁与深秋天光中缓缓发亮。"
  subtitle_en: "Canal reflections, quiet bridges, and October afternoons drifting through Venice."
  subtitle_zh: "运河的倒影、安静的桥梁，以及在威尼斯缓缓流动的十月午后。"

sep_france:
  summary_en: "Where elegance feels effortless — Paris unfolds through gardens, facades, and a soft September clarity."
  summary_zh: "优雅在这里显得毫不费力——巴黎在花园、街景与九月清透的空气中徐徐展开。"
  subtitle_en: "Museum light, palace courtyards, and slow Parisian moments in early autumn."
  subtitle_zh: "博物馆的光线、宫殿庭院，以及初秋里缓慢流动的巴黎时刻。"

aug_germany:
  summary_en: "Where structure meets calm — Germany appears in ordered streets, historic forms, and the measured rhythm of summer."
  summary_zh: "秩序与宁静在这里相遇——德国在整齐街道、历史建筑与夏日克制的节奏中显现出来。"
  subtitle_en: "Historic streets, architectural detail, and summer scenes shaped by clarity and balance."
  subtitle_zh: "历史街道、建筑细节，以及被清晰与平衡感塑造出的夏日景象。"
